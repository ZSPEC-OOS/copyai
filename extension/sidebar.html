<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CopyAI</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app">

    <!-- ── Login Screen ──────────────────────────────────────── -->
    <div id="login-screen" class="login-screen hidden">
      <div class="login-logo">
        <div class="logo-icon" style="width:36px;height:36px;font-size:18px;border-radius:10px">✦</div>
        <div class="login-title">CopyAI</div>
        <div class="login-sub">Sign in to access your prompts</div>
      </div>
      <div class="login-form">
        <input id="login-user" type="text" placeholder="Username" autocomplete="username">
        <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
        <div id="login-error" class="login-error hidden"></div>
        <button class="btn-accent" id="login-btn" style="width:100%;justify-content:center">Sign In</button>
      </div>
    </div>

    <!-- ── Loading Screen ────────────────────────────────────── -->
    <div id="loading-screen" class="loading-screen hidden">
      <div class="logo-icon" style="width:32px;height:32px;font-size:16px;border-radius:9px;opacity:.8">✦</div>
      <div class="loading-text">Loading your prompts…</div>
    </div>

    <!-- ── Main App ──────────────────────────────────────────── -->
    <div id="main-app" class="hidden">

      <!-- Header -->
      <header class="header">
        <div class="logo">
          <div class="logo-icon">✦</div>
          CopyAI
        </div>
        <span id="prompt-count" class="count-badge" style="display:none"></span>
        <div class="header-actions">
          <button class="btn-default btn-sm" id="library-btn" title="Open layout library">
            📚 <span id="lib-label">Library</span>
          </button>
          <button class="btn-accent btn-sm" id="save-btn" title="Save current prompts as a layout">
            💾 Save
          </button>
          <button class="btn-icon btn-sm" id="logout-btn" title="Sign out" style="padding:4px 7px;font-size:13px">⏏</button>
        </div>
      </header>

      <!-- Scrollable body -->
      <div class="content">

        <!-- Add Prompt section (collapsible) -->
        <div class="add-section">
          <button class="add-toggle" id="add-toggle">
            <span>+ Add Prompt</span>
            <span class="chevron">▼</span>
          </button>
          <div class="add-form hidden" id="add-form">
            <input id="new-title" type="text" placeholder="Title…" autocomplete="off">
            <textarea id="new-text" rows="3" placeholder="Prompt text…"></textarea>
            <div>
              <button class="btn-accent btn-sm" id="add-btn">Add</button>
            </div>
          </div>
        </div>

        <!-- Search bar -->
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Search prompts…" autocomplete="off">
        </div>

        <!-- Section label -->
        <div id="prompts-label" class="section-label" style="display:none">Your Prompts</div>

        <!-- Prompts list -->
        <div id="prompts-container"></div>

      </div><!-- /content -->

      <!-- Toast notification -->
      <div class="toast hidden" id="toast"></div>

      <!-- ── Library Modal ───────────────────────────────────── -->
      <div class="modal-backdrop hidden" id="library-modal">
        <div class="modal-panel">
          <div class="modal-header">
            <div class="modal-title">
              Library
              <span id="lib-modal-count" class="count-badge" style="margin-left:6px;display:none"></span>
            </div>
            <button class="btn-accent btn-sm" id="close-library">✕ Close</button>
          </div>
          <div class="lib-toolbar">
            <label class="lib-btn" title="Import a layout JSON file">
              ↑ Import Layout
              <input type="file" accept="application/json" hidden id="import-layout-input">
            </label>
            <button class="lib-btn" id="export-layout-btn" title="Export current prompts as JSON file">
              ↓ Export Layout
            </button>
            <label class="lib-btn" title="Import a full library JSON file">
              ↑ Import Library
              <input type="file" accept="application/json" hidden id="import-library-input">
            </label>
            <button class="lib-btn" id="export-library-btn" title="Copy all layouts as JSON to clipboard">
              ↓ Export Library
            </button>
          </div>
          <div class="modal-body">
            <div id="layouts-list"></div>
          </div>
        </div>
      </div>

      <!-- ── Edit Modal ──────────────────────────────────────── -->
      <div class="modal-backdrop hidden" id="edit-modal">
        <div class="modal-panel">
          <div class="modal-header">
            <div class="modal-title">Edit Prompt</div>
            <button class="btn-default btn-sm" id="close-edit">✕ Cancel</button>
          </div>
          <div class="modal-body">
            <div style="display:grid;gap:10px">
              <input id="edit-title" type="text" placeholder="Title…" autocomplete="off">
              <textarea id="edit-text" rows="7" placeholder="Prompt text…"></textarea>
              <div>
                <button class="btn-accent" id="save-edit-btn">Save Changes</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /main-app -->
  </div><!-- /app -->

  <script src="sidebar.js"></script>
</body>
</html>
